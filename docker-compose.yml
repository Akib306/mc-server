
services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft-forge
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "FORGE"
      VERSION: "1.20.1"
      MEMORY: "6G"
    volumes:
      - ./minecraft-data:/data
      - ./mods:/mods:ro
    tty: true
    stdin_open: true
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: mc-ngrok
    depends_on:
      - minecraft
    command:
      - tcp
      - minecraft:25565
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?set NGROK_AUTHTOKEN in .env}
    ports:
      - "127.0.0.1:4040:4040"
    restart: unless-stopped