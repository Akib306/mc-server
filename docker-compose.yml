version: "3.8"

services:
  minecraft:
    image: itzg/minecraft-server
    container_name: mc-server
    environment:
      EULA: "TRUE"
      TYPE: "PAPER" # PaperMC is highly recommended over Vanilla for better performance
      VERSION: "LATEST"
    volumes:
      - ./data:/data
    ports:
      - "25565:25565" # Optional: Only needed if want to connect locally via localhost
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: mc-ngrok
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: "tcp minecraft:25565 --log=stdout"
    depends_on:
      - minecraft
    restart: unless-stopped
